services:
  nims-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nims-dev
    ports:
      - "0.0.0.0:3001:3001"
    volumes:
      - nims-dev-data:/app/packages/nims-server/data
    environment:
      - NODE_ENV=development
    restart: unless-stopped

volumes:
  nims-dev-data:
