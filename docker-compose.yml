version: "3.9"

services:
  app:
    build: .
    container_name: larpwriter-app
    restart: always
    volumes:
      - nims-data:/app
    environment:
      - NODE_ENV=production
    expose:
      - "3001"
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: larpwriter-nginx
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/nginx-entrypoint.sh:/entrypoint.sh
      - ./nginx/ssl:/etc/nginx/ssl:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      - DOMAINS=${DOMAINS}
      - SSL_ENABLED=${SSL_ENABLED}
    depends_on:
      - app
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  nims-data:
    name: nims-data